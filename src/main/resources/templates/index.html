<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Student Management</title>
</head>

<body>

<h2>Student Registration</h2>

<form th:action="@{/save}" th:object="${student}" method="post">

Name:
<input type="text" th:field="*{name}" required><br><br>

Email:
<input type="text" th:field="*{email}" required><br><br>

Course:
<input type="text" th:field="*{course}" required><br><br>

<button type="submit">Submit</button>

</form>

<h2>Student List</h2>

<table border="1">

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Course</th>
</tr>

<tr th:each="s : ${students}">
<td th:text="${s.id}"></td>
<td th:text="${s.name}"></td>
<td th:text="${s.email}"></td>
<td th:text="${s.course}"></td>
</tr>

</table>

</body>
</html>
